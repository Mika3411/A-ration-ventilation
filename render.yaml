databases:
  - name: aeration-ventilation-db
    plan: basic-256mb

services:
  - type: web
    name: aeration-ventilation
    runtime: node
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aeration-ventilation-db
          property: connectionString
      - key: DATABASE_SSL
        value: "false"
      - key: AUTH_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: CONTACT_TO
        value: contact@aeration-ventilation.fr
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SITE_URL
        value: https://aeration-ventilation.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_AUTOMATIC_TAX
        value: "false"
